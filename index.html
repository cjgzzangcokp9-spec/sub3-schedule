<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>박현준님 100일 프로젝트 — 춘천마라톤 서브3</title>
<style>
:root{
  --track-red:#D14A1F;
  --track-red-dim:#7A2F15;
  --ink:#16140F;
  --ink-soft:#3A3530;
  --paper:#F6F1E6;
  --paper-dim:#EAE2D2;
  --lane-gold:#C49A3A;
  --prep-gray:#9C958A;
  --rest-blue:#5C7A8A;
  --line:#D8CFBC;
  --display: "Pretendard", "Apple SD Gothic Neo", "Segoe UI", sans-serif;
  --mono: "JetBrains Mono", "SF Mono", "Consolas", monospace;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:var(--display);
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px;}

/* HEADER */
.header{
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  align-items:flex-end;
  gap:20px;
  padding-bottom:20px;
  border-bottom:3px solid var(--ink);
  margin-bottom:24px;
}
.header h1{
  font-size:clamp(26px,4vw,40px);
  font-weight:800;
  letter-spacing:-0.02em;
  margin:0 0 6px;
  line-height:1.1;
}
.header .sub{
  font-family:var(--mono);
  font-size:13px;
  color:var(--ink-soft);
  letter-spacing:0.02em;
}
.header .stats{
  display:flex;
  gap:22px;
  font-family:var(--mono);
}
.stat{text-align:right;}
.stat .num{font-size:26px;font-weight:700;color:var(--track-red);display:block;line-height:1;}
.stat .lbl{font-size:11px;color:var(--ink-soft);letter-spacing:0.05em;}

/* LANE PROGRESS BAR — signature element */
.lane-progress{
  position:relative;
  height:54px;
  margin-bottom:28px;
  border-radius:2px;
  overflow:hidden;
  background:repeating-linear-gradient(
    90deg,
    var(--ink) 0px, var(--ink) 1px,
    transparent 1px, transparent 38px
  );
  background-color:#1f1c16;
}
.lane-progress .seg{
  position:absolute;top:0;bottom:0;
  display:flex;align-items:center;
  font-family:var(--mono);font-size:10px;color:rgba(246,241,230,0.65);
  letter-spacing:0.08em;
  padding-left:8px;
  border-right:2px dashed rgba(246,241,230,0.25);
}
.lane-progress .seg.prep{background:rgba(156,149,138,0.35);}
.lane-progress .seg.main{background:rgba(209,74,31,0.35);}
.lane-progress .seg.dday{background:var(--lane-gold);color:var(--ink);font-weight:700;border-right:none;}
.lane-progress .today-mark{
  position:absolute;top:-3px;bottom:-3px;width:3px;background:var(--paper);
  box-shadow:0 0 0 1px var(--ink);
}

/* LEGEND */
.legend{
  display:flex;flex-wrap:wrap;gap:18px;
  margin-bottom:30px;
  font-family:var(--mono);
  font-size:12px;
  color:var(--ink-soft);
}
.legend .item{display:flex;align-items:center;gap:6px;}
.legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block;}

/* MONTH BLOCK */
.month{margin-bottom:46px;}
.month-title{
  font-size:20px;font-weight:800;margin:0 0 12px;
  display:flex;align-items:baseline;gap:10px;
}
.month-title .phase-tag{
  font-family:var(--mono);font-size:11px;font-weight:600;
  padding:3px 8px;border-radius:3px;letter-spacing:0.04em;
}
.tag-prep{background:var(--prep-gray);color:#fff;}
.tag-main{background:var(--track-red);color:#fff;}
.tag-mixed{background:linear-gradient(90deg,var(--prep-gray) 50%,var(--track-red) 50%);color:#fff;}
.tag-dday{background:var(--lane-gold);color:var(--ink);}

.cal-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:5px;
}
.wd{
  font-family:var(--mono);
  font-size:11px;
  text-align:center;
  color:var(--ink-soft);
  padding-bottom:4px;
  letter-spacing:0.06em;
}
.cell{
  position:relative;
  min-height:104px;
  background:#fff;
  border:1px solid var(--line);
  border-radius:4px;
  padding:6px 7px;
  cursor:pointer;
  transition:transform .12s ease, box-shadow .12s ease;
  display:flex;flex-direction:column;
  overflow:hidden;
}
.cell:hover{transform:translateY(-2px);box-shadow:0 6px 14px rgba(0,0,0,0.12);z-index:2;}
.cell.empty{background:transparent;border:none;cursor:default;}
.cell.empty:hover{transform:none;box-shadow:none;}

.cell.prep{border-left:4px solid var(--prep-gray);}
.cell.main{border-left:4px solid var(--track-red);}
.cell.dday{border-left:4px solid var(--lane-gold);background:#FFF8E8;}
.cell.rest{border-left:4px solid var(--rest-blue);}

.cell .date-num{
  font-family:var(--mono);font-weight:700;font-size:13px;
}
.cell .date-num.weekend{color:var(--track-red-dim);}
.cell .day-tag{
  font-family:var(--mono);font-size:9.5px;color:var(--ink-soft);
  margin-top:1px;
}
.cell .stars{
  font-size:10px;letter-spacing:-1px;color:var(--lane-gold);margin-top:2px;line-height:1;
}
.cell .title{
  font-size:11.5px;font-weight:700;margin-top:4px;line-height:1.25;
  display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;
}
.cell.dday .title{color:var(--track-red);}
.cell .today-badge{
  position:absolute;top:5px;right:5px;
  background:var(--ink);color:var(--paper);
  font-family:var(--mono);font-size:8px;font-weight:700;
  padding:2px 5px;border-radius:2px;letter-spacing:0.05em;
}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(22,20,15,0.7);
  display:none;align-items:center;justify-content:center;
  padding:20px;z-index:50;
}
.modal-overlay.open{display:flex;}
.modal{
  background:var(--paper);
  max-width:520px;width:100%;
  max-height:85vh;overflow-y:auto;
  border-radius:6px;
  border:2px solid var(--ink);
  padding:26px 26px 22px;
  position:relative;
}
.modal .close-btn{
  position:absolute;top:14px;right:16px;
  background:none;border:none;font-size:22px;cursor:pointer;color:var(--ink-soft);
  line-height:1;padding:4px;
}
.modal .m-date{
  font-family:var(--mono);font-size:13px;color:var(--ink-soft);letter-spacing:0.03em;
}
.modal .m-tag{
  display:inline-block;font-family:var(--mono);font-size:11px;font-weight:700;
  padding:3px 9px;border-radius:3px;margin:8px 0 4px;letter-spacing:0.03em;
}
.modal h2{
  font-size:21px;font-weight:800;margin:6px 0 4px;line-height:1.25;
}
.modal .m-stars{font-size:15px;color:var(--lane-gold);margin-bottom:14px;}
.modal .m-summary{
  font-size:14.5px;line-height:1.65;color:var(--ink);
  background:#fff;border:1px solid var(--line);border-radius:5px;
  padding:14px 16px;white-space:pre-line;
}
.modal .m-note{
  margin-top:14px;font-size:12.5px;color:var(--ink-soft);
  font-family:var(--mono);line-height:1.6;
}

footer.note{
  margin-top:10px;
  font-size:12.5px;color:var(--ink-soft);line-height:1.7;
  border-top:1px solid var(--line);padding-top:16px;
}
@media (max-width:640px){
  .cell{min-height:80px;padding:4px 5px;}
  .cell .title{font-size:10px;-webkit-line-clamp:2;}
  .header .stats{gap:14px;}
}
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <div>
      <h1>박현준님 100일 프로젝트</h1>
      <div class="sub">춘천마라톤 · 풀코스 기록단축 · 최근 1000m 3'20" → 목표 서브3 (3:00:00)</div>
    </div>
    <div class="stats">
      <div class="stat"><span class="num" id="statTotal">126</span><span class="lbl">전체 일수</span></div>
      <div class="stat"><span class="num">25</span><span class="lbl">준비일</span></div>
      <div class="stat"><span class="num">100</span><span class="lbl">본훈련일</span></div>
    </div>
  </div>

  <div class="lane-progress" id="laneProgress"></div>

  <div class="legend">
    <span class="item"><span class="dot" style="background:var(--prep-gray)"></span>준비기간 (1~25일차 반복, 6/22~7/16)</span>

    <span class="item"><span class="dot" style="background:var(--rest-blue)"></span>완전휴식/휴식일</span>
    <span class="item"><span class="dot" style="background:var(--lane-gold)"></span>D-DAY (10/25)</span>
  </div>

  <div id="calendarRoot"></div>

  <footer class="note">
    ⓒ 오픈케어 100일 프로젝트 기반 일정표 · 날짜를 클릭하면 그날 훈련 상세 내용을 볼 수 있습니다 · 준비기간 중에는 절대 무리하지 말고 컨디션 유지에 집중하세요.
  </footer>

</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="close-btn" id="closeBtn">✕</button>
    <div class="m-date" id="mDate"></div>
    <span class="m-tag" id="mTag"></span>
    <h2 id="mTitle"></h2>
    <div class="m-stars" id="mStars"></div>
    <div class="m-summary" id="mSummary"></div>
    <div class="m-note" id="mNote"></div>
  </div>
</div>

<script>

const PROGRAM_MAP = {};
PROGRAM_DATA.forEach(p => PROGRAM_MAP[p.day] = p);

const SCHEDULE_MAP = {}; // date -> entry
SCHEDULE.forEach(s => SCHEDULE_MAP[s.date] = s);

const WEEKDAYS = ["일","월","화","수","목","금","토"];
const MONTH_NAMES = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

function pad(n){return n<10?"0"+n:""+n;}
function toISO(y,m,d){return `${y}-${pad(m+1)}-${pad(d)}`;}

// today reference (fixed simulation date)
const TODAY_ISO = "2026-06-22";

function buildLaneProgress(){
  const root = document.getElementById('laneProgress');
  const total = SCHEDULE.length; // 126
  let prepCount=0, mainCount=0;
  SCHEDULE.forEach(s=>{ if(s.phase==='prep') prepCount++; else if(s.phase==='main') mainCount++; });
  const prepPct = prepCount/total*100;
  const mainPct = mainCount/total*100;
  const ddayPct = 100-prepPct-mainPct;

  root.innerHTML = `
    <div class="seg prep" style="left:0%;width:${prepPct}%">준비 1~25일차</div>
    <div class="seg main" style="left:${prepPct}%;width:${mainPct}%">본훈련 1~100일차</div>
    <div class="seg dday" style="left:${prepPct+mainPct}%;width:${ddayPct}%">D-DAY</div>
  `;
  // today marker
  const todayIdx = SCHEDULE.findIndex(s=>s.date===TODAY_ISO);
  if(todayIdx>=0){
    const pct = todayIdx/total*100;
    const mark = document.createElement('div');
    mark.className='today-mark';
    mark.style.left = pct+'%';
    root.appendChild(mark);
  }
}

function phaseTagLabel(phase, programDay){
  if(phase==='prep') return {cls:'prep', text:`준비 ${programDay}일차`};
  if(phase==='main') return {cls:'main', text:`본훈련 ${programDay}일차`};
  if(phase==='dday') return {cls:'dday', text:'D-DAY'};
  return {cls:'prep', text:''};
}

function getDayContent(phase, programDay){
  if(phase==='dday') return DDAY_INFO;
  return PROGRAM_MAP[programDay] || {stars:0, title:'', summary:''};
}

function starString(n){
  if(!n) return '';
  return '★'.repeat(n) + '☆'.repeat(5-n);
}

function isRestDay(title){
  return title === '휴식' || title === '완전 휴식';
}

function openModal(dateISO, phase, programDay){
  const content = getDayContent(phase, programDay);
  const tag = phaseTagLabel(phase, programDay);
  const d = new Date(dateISO+'T00:00:00');
  const label = `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${WEEKDAYS[d.getDay()]})`;

  document.getElementById('mDate').textContent = label;
  const tagEl = document.getElementById('mTag');
  tagEl.textContent = tag.text;
  tagEl.className = 'm-tag tag-'+tag.cls;
  document.getElementById('mTitle').textContent = content.title || '';
  document.getElementById('mStars').textContent = content.stars ? starString(content.stars) : '';
  document.getElementById('mSummary').textContent = content.summary || '';

  let note = '';
  if(phase==='prep') note = PREP_NOTE;
  if(phase==='main' && isRestDay(content.title)) note = '회복에 집중하는 날입니다. 가벼운 스트레칭 외 추가 훈련은 권장하지 않습니다.';
  document.getElementById('mNote').textContent = note;

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('open');
}
document.getElementById('closeBtn').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', (e)=>{
  if(e.target.id==='modalOverlay') closeModal();
});

function buildCalendar(){
  const root = document.getElementById('calendarRoot');
  const startDate = new Date(SCHEDULE[0].date+'T00:00:00');
  const endDate = new Date(SCHEDULE[SCHEDULE.length-1].date+'T00:00:00');

  let cursorY = startDate.getFullYear();
  let cursorM = startDate.getMonth();
  const endY = endDate.getFullYear();
  const endM = endDate.getMonth();

  while(cursorY < endY || (cursorY===endY && cursorM<=endM)){
    const monthBlock = document.createElement('div');
    monthBlock.className='month';

    const firstOfMonth = new Date(cursorY, cursorM, 1);
    const daysInMonth = new Date(cursorY, cursorM+1, 0).getDate();
    const startWeekday = firstOfMonth.getDay();

    // determine phases present in this month for tag
    let phasesPresent = new Set();
    for(let d=1; d<=daysInMonth; d++){
      const iso = toISO(cursorY,cursorM,d);
      const entry = SCHEDULE_MAP[iso];
      if(entry) phasesPresent.add(entry.phase);
    }
    let tagHtml = '';
    if(phasesPresent.has('prep') && phasesPresent.has('main')){
      tagHtml = `<span class="phase-tag tag-mixed">준비→본훈련 전환</span>`;
    } else if(phasesPresent.has('prep')){
      tagHtml = `<span class="phase-tag tag-prep">준비기간</span>`;
    } else if(phasesPresent.has('main') && phasesPresent.has('dday')){
      tagHtml = `<span class="phase-tag tag-mixed">본훈련→D-DAY</span>`;
    } else if(phasesPresent.has('main')){
      tagHtml = `<span class="phase-tag tag-main">본훈련</span>`;
    } else if(phasesPresent.has('dday')){
      tagHtml = `<span class="phase-tag tag-dday">D-DAY</span>`;
    }

    monthBlock.innerHTML = `<h3 class="month-title">${cursorY}년 ${MONTH_NAMES[cursorM]} ${tagHtml}</h3>`;

    const grid = document.createElement('div');
    grid.className='cal-grid';

    WEEKDAYS.forEach(wd=>{
      const wdEl = document.createElement('div');
      wdEl.className='wd';
      wdEl.textContent = wd;
      grid.appendChild(wdEl);
    });

    for(let i=0;i<startWeekday;i++){
      const empty = document.createElement('div');
      empty.className='cell empty';
      grid.appendChild(empty);
    }

    for(let d=1; d<=daysInMonth; d++){
      const iso = toISO(cursorY,cursorM,d);
      const entry = SCHEDULE_MAP[iso];
      const cell = document.createElement('div');
      const weekdayIdx = new Date(cursorY,cursorM,d).getDay();

      if(!entry){
        cell.className='cell empty';
        grid.appendChild(cell);
        continue;
      }

      const content = getDayContent(entry.phase, entry.programDay);
      const isRest = isRestDay(content.title);
      let cls = 'cell ' + entry.phase;
      if(isRest) cls = 'cell rest';
      cell.className = cls;

      const isWeekend = weekdayIdx===0 || weekdayIdx===6;
      const dayTagText = entry.phase==='dday' ? 'D-DAY' : (entry.phase==='prep' ? `준비 ${entry.programDay}일` : `${entry.programDay}일차`);

      cell.innerHTML = `
        <div class="date-num ${isWeekend?'weekend':''}">${d}</div>
        <div class="day-tag">${dayTagText}</div>
        ${content.stars ? `<div class="stars">${starString(content.stars)}</div>` : ''}
        <div class="title">${content.title||''}</div>
        ${iso===TODAY_ISO ? '<div class="today-badge">TODAY</div>' : ''}
      `;
      cell.addEventListener('click', ()=>openModal(iso, entry.phase, entry.programDay));
      grid.appendChild(cell);
    }

    monthBlock.appendChild(grid);
    root.appendChild(monthBlock);

    cursorM++;
    if(cursorM>11){cursorM=0;cursorY++;}
  }
}

buildLaneProgress();
buildCalendar();
